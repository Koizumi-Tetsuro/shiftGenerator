<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta property="og:title" content="希望シフトくん(スマホ版)">
    <meta property="og:description" content="シフト提出の負担軽減を目的に作成しました">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://koizumi-tetsuro.github.io/shiftGenerator/icon.png">
    
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            text-align: center;
            background-color: rgb(235, 235, 200);
        }

        h2 {
            font-size: 6vw;
        }

        .form {
            margin-left: 5vw;
            width: 90vw;
            background-color: beige;
        }
        
        .inputForm {
            display: flex;
            margin: 0 auto;
        }
        
        .left, .right{
            width: 45vw;
        }

        .inputRow {
            margin-bottom: 1.5vh;
        }

        .select {
            margin-bottom: 4vh;
            font-size: 4vw;
        }
        
        select {
            margin-top: 2vh;
            font-size: 4vw;
        }

        .inputForm label{
            font-size: 3.5vw;
        }

        .input {
            height: 1.5em;
            width: 2.5em;
            font-size: 3.5vw;
        }

        textarea {
            font-size: 4vw;
            margin-top: 4vh;
        }

        button {
            font-size: 4vw;
            cursor: pointer;
        }
        
        #generate {            
            margin-top: 3vh;
            margin-bottom: 1.3vh;
        }
        
        #openLine {
            background-color: #06C755;
            color: white;
            margin-bottom: 5vh;
        }

        footer {
            font-size: 3vw;
        }
    </style>

    <title>希望シフトくん(スマホ版)</title>
</head>

<body>
    <header>
        <h2>希望シフトくん</h2>
    </header>

    <main>
        <div class="form">
            <div class="select">
                <select id="year">

                </select>
                <label>年</label>
                <select id="month">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                </select>
                <label>月</label>

                <select id="selectHalf">
                    <option value="first">前半</option>
                    <option value="second">後半</option>
                </select>
            </div>

            <div class="inputForm" id="inputForm">
                <div class="left" id="left">

                </div>
                
                <div class="right" id="right">

                </div>
            </div>

            <button id="generate">確定</button>
        </div>

            <div class="textForm">
                <textarea rows="19" cols="23" id="output" placeholder="上の回答欄に希望時刻入力
                
入力例
9:00希望 -> 900
14:30希望 -> 1430
OFF希望 -> 空欄

確定ボタン押下で出力

---------出力例---------

1月前半の希望シフトです

1(月)9:00～14:30
2(火)OFF
3(水)7:00～10:00
    ・
    ・
    ・"></textarea>
                <div>
                    <button id="openLine">LINEで転送</button>
                </div>
            </div>
    </main>

    <footer>最終更新 2026.6.7-23:15</footer>

    <script></script>
</body>

</html>
