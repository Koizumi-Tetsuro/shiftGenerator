<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta property="og:title" content="希望シフトくん(スマホ版)">
    <meta property="og:description" content="シフト提出の負担軽減を目的に作成しました．不具合，ご要望等ございましたらご連絡下さい．善処いたします．">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://koizumi-tetsuro.github.io/shiftGenerator/clockMan.jpg">
    
    <link rel="stylesheet" href="prototype.css">

    <title>希望シフトくん(スマホ版)</title>
</head>

<body>
    <header>
        <h2>希望シフトくん</h2>
    </header>

    <main>
        <div class="form">
            <div class="select">
                <select id="year">

                </select>
                <label>年</label>
                <select id="month">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                </select>
                <label>月</label>

                <select id="selectHalf">
                    <option value="first">前半</option>
                    <option value="second">後半</option>
                </select>
            </div>

            <div class="inputForm" id="inputForm">
                <div class="left" id="left">

                </div>
                
                <div class="right" id="right">

                </div>
            </div>

            <button id="generate">確定</button>
        </div>

            <div class="textForm">
                <textarea rows="19" cols="23" id="output" placeholder="上の回答欄に希望時刻入力
                
入力例
9:00希望 -> 900
14:30希望 -> 1430
OFF希望 -> 空欄(& BackSpace)

確定ボタン押下で出力

---------出力例---------

1月前半の希望シフトです

1(月)9:00～14:30
2(火)OFF
3(水)18:00～21:00
    ・
    ・
    ・"></textarea>
                <div>
                    <button id="openLine">LINEで転送</button>
                </div>
            </div>
    </main>

    <footer>プログラム最終更新 2026/6/8/15:54
不具合，ご要望等ございましたらご連絡下さい．善処いたします．</footer>

    <script type="module" src="prototype.js"></script>
</body>

</html>
